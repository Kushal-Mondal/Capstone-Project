<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EventSphere — Registrations</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --ink: #0b0c10; --surface: #111318; --border: rgba(255,255,255,0.07);
      --cream: #f5f0e8; --gold: #c9a84c; --gold-light: #e8c96a;
      --rust: #c4522a; --teal: #1a7a6e; --teal-light: #4ecdc4;
      --muted: #6b6560; --muted-2: #4a4845;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--ink); color: var(--cream); min-height: 100vh; }
    .app { display: flex; min-height: 100vh; }
    .sidebar {
      width: 240px; flex-shrink: 0; background: var(--surface);
      border-right: 1px solid var(--border); display: flex; flex-direction: column;
      padding: 28px 0; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100;
    }
    .sidebar-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 900; letter-spacing: -0.02em; padding: 0 24px 28px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
    .sidebar-logo span { color: var(--gold); }
    .sidebar-section { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted-2); padding: 0 24px; margin-bottom: 8px; margin-top: 12px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 24px; font-size: 0.875rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: color 0.2s, background 0.2s; text-decoration: none; position: relative; }
    .nav-item:hover { color: var(--cream); background: rgba(255,255,255,0.03); }
    .nav-item.active { color: var(--gold); background: rgba(201,168,76,0.06); }
    .nav-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--gold); }
    .sidebar-footer { margin-top: auto; padding: 20px 24px; border-top: 1px solid var(--border); }
    .admin-badge { display: flex; align-items: center; gap: 10px; }
    .admin-avatar { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--gold), var(--rust)); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; color: var(--ink); flex-shrink: 0; }
    .admin-name { font-size: 0.82rem; font-weight: 600; }
    .admin-role { font-size: 0.7rem; color: var(--muted); }
    .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 20px 36px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-size: 1rem; font-weight: 600; }
    .topbar-sub { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .topbar-right { display: flex; align-items: center; gap: 12px; }
    .icon-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: color 0.2s, border-color 0.2s; }
    .icon-btn:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }
    .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25); border-radius: 8px; color: var(--gold); font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .refresh-btn:hover { background: rgba(201,168,76,0.18); }
    .page-content { padding: 36px; flex: 1; }
    .table-controls { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .search-box { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; flex: 1; min-width: 200px; }
    .search-box input { background: transparent; border: none; outline: none; font-family: 'DM Sans', sans-serif; font-size: 0.875rem; color: var(--cream); width: 100%; }
    .search-box input::placeholder { color: var(--muted); }
    .filter-chip { display: flex; align-items: center; gap: 6px; padding: 8px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 0.78rem; font-weight: 500; color: var(--muted); cursor: pointer; transition: color 0.2s, border-color 0.2s; white-space: nowrap; }
    .filter-chip:hover { color: var(--cream); border-color: rgba(255,255,255,0.2); }
    .filter-chip.active { color: var(--gold); border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.05); }
    .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; }
    .table-header-bar { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px 16px; border-bottom: 1px solid var(--border); }
    .table-header-title { font-size: 0.9rem; font-weight: 600; }
    .table-count { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); background: rgba(255,255,255,0.04); padding: 3px 10px; border-radius: 100px; }
    table { width: 100%; border-collapse: collapse; }
    thead th { text-align: left; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); padding: 12px 24px; background: rgba(255,255,255,0.02); border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }
    tbody td { padding: 14px 24px; font-size: 0.875rem; vertical-align: middle; }
    .user-cell { display: flex; align-items: center; gap: 10px; }
    .user-dot { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; flex-shrink: 0; }
    .user-name { font-weight: 500; font-size: 0.875rem; }
    .user-email { font-size: 0.72rem; color: var(--muted); margin-top: 1px; font-family: 'DM Mono', monospace; }
    .event-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 0.75rem; font-weight: 500; padding: 4px 10px; border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--cream); }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.04em; padding: 4px 10px; border-radius: 100px; }
    .status-badge.checked { background: rgba(78,205,196,0.1); color: var(--teal-light); }
    .status-badge.pending { background: rgba(201,168,76,0.08); color: var(--gold); }
    .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
    .time-cell { font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--muted); }
    .year-badge { font-size: 0.72rem; font-weight: 600; padding: 3px 10px; border-radius: 6px; background: rgba(255,255,255,0.05); color: var(--muted); }
    .checkin-btn { padding: 6px 14px; border-radius: 7px; font-size: 0.75rem; font-weight: 600; cursor: pointer; border: 1px solid; transition: all 0.2s; white-space: nowrap; }
    .checkin-btn.do-checkin { background: rgba(78,205,196,0.08); border-color: rgba(78,205,196,0.25); color: var(--teal-light); }
    .checkin-btn.do-checkin:hover { background: rgba(78,205,196,0.16); }
    .checkin-btn.undo-checkin { background: rgba(107,101,96,0.1); border-color: rgba(107,101,96,0.2); color: var(--muted); }
    .checkin-btn.undo-checkin:hover { background: rgba(107,101,96,0.15); color: var(--cream); }
    .empty-state { text-align: center; padding: 60px 24px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }
    .toast { position: fixed; bottom: 28px; right: 28px; background: rgba(17,19,24,0.97); border: 1px solid rgba(78,205,196,0.35); border-radius: 12px; padding: 14px 20px; display: flex; align-items: center; gap: 12px; font-size: 0.84rem; z-index: 999; transform: translateY(80px); opacity: 0; transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s; backdrop-filter: blur(20px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); max-width: 300px; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .av-0 { background: linear-gradient(135deg, #c9a84c, #c4522a); color: #0b0c10; }
    .av-1 { background: linear-gradient(135deg, #1a7a6e, #4ecdc4); color: #0b0c10; }
    .av-2 { background: linear-gradient(135deg, #6b35a8, #c9a84c); color: #fff; }
    .av-3 { background: linear-gradient(135deg, #c4522a, #c9a84c); color: #fff; }
    .av-4 { background: linear-gradient(135deg, #1a4a7a, #4ecdc4); color: #fff; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    .table-card { animation: fadeUp 0.5s ease both; }
    @media(max-width:768px){.sidebar{display:none}.main{margin-left:0}.page-content{padding:20px}}
  </style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-logo">Event<span>Sphere</span></div>
    <div class="sidebar-section">Main</div>
    <a class="nav-item" href="/users-page">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Overview
    </a>
    <a class="nav-item active" href="/registrations-page">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0"/></svg>
      Registrations
    </a>
    <a class="nav-item" href="/events-page">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
      Events
    </a>
    <a class="nav-item" href="/analytics-page">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
      Analytics
    </a>
    <div class="sidebar-section">Config</div>
    <a class="nav-item" href="#"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m0 14v1m8-8h-1M5 12H4m13.66-6.34l-.7.7M6.34 17.66l-.7.7m12.02 0l-.7-.7M6.34 6.34l-.7-.7M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>Settings</a>
    <a class="nav-item" href="/"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>Back to Site</a>
    <div class="sidebar-footer">
      <div class="admin-badge">
        <div class="admin-avatar">AD</div>
        <div><div class="admin-name">Admin</div><div class="admin-role">Super Admin</div></div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title">All Registrations</div>
        <div class="topbar-sub" id="lastUpdated">Loading...</div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" onclick="exportCSV()" title="Export CSV">
          <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
        </button>
        <button class="refresh-btn" onclick="loadUsers()">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" id="refreshIcon"><path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
          Refresh
        </button>
      </div>
    </div>

    <div class="page-content">
      <div class="table-controls">
        <div class="search-box">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="color:var(--muted);flex-shrink:0"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" id="searchInput" placeholder="Search by name, email or event..." oninput="applyFilters()"/>
        </div>
        <div class="filter-chip active" onclick="setFilter('all',this)">All</div>
        <div class="filter-chip" onclick="setFilter('checked',this)">✓ Checked In</div>
        <div class="filter-chip" onclick="setFilter('pending',this)">⏳ Pending</div>
        <div class="filter-chip" onclick="setFilter('sort-name',this)">↑ Name</div>
        <div class="filter-chip" onclick="setFilter('sort-date',this)">↓ Latest</div>
      </div>

      <div class="table-card">
        <div class="table-header-bar">
          <span class="table-header-title">Registered Participants</span>
          <span class="table-count" id="tableCount">—</span>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>Participant</th>
                <th>Event</th>
                <th>Year</th>
                <th>Status</th>
                <th>Registered</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="usersBody">
              <tr><td colspan="6"><div class="empty-state"><span class="empty-icon">⏳</span><div>Loading...</div></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"><span id="toastMsg" style="font-weight:500;"></span></div>

<script>
let allUsers = [], currentFilter = 'all';
const EVENT_EMOJIS = {'Cultural Fest':'🎨','Hackathon':'💻','TEDx':'🎤','Sports Meet':'🏆','Battle of Bands':'🎵','Photography Contest':'📷','Debate Competition':'🗣️'};
const AVATAR_COLORS = ['av-0','av-1','av-2','av-3','av-4'];
function getInitials(n){return n?n.split(' ').map(x=>x[0]).join('').toUpperCase().slice(0,2):'?'}
function getAvatarClass(n){let h=0;for(let c of(n||''))h=(h*31+c.charCodeAt(0))&0xfffff;return AVATAR_COLORS[h%5]}
function formatDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}
function showToast(msg){const t=document.getElementById('toast');document.getElementById('toastMsg').textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000)}

async function loadUsers(){
  try{
    const res=await fetch('/users');
    allUsers=await res.json();
  }catch(e){
    allUsers=[];
  }
  applyFilters();
  document.getElementById('lastUpdated').textContent=`${allUsers.length} total registrations`;
}

function applyFilters(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  let f=allUsers.filter(u=>{
    const m=!q||u.name.toLowerCase().includes(q)||u.event.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q);
    if(!m)return false;
    if(currentFilter==='checked')return u.status==='checked-in';
    if(currentFilter==='pending')return u.status!=='checked-in';
    return true;
  });
  if(currentFilter==='sort-name')f=[...f].sort((a,b)=>a.name.localeCompare(b.name));
  if(currentFilter==='sort-date')f=[...f].sort((a,b)=>new Date(b.registeredAt)-new Date(a.registeredAt));
  renderTable(f);
}

function setFilter(filter,el){
  currentFilter=filter;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  applyFilters();
}

function renderTable(users){
  document.getElementById('tableCount').textContent=`${users.length} participants`;
  if(!users.length){
    document.getElementById('usersBody').innerHTML=`<tr><td colspan="6"><div class="empty-state"><span class="empty-icon">🔍</span><div>No results found.</div></div></td></tr>`;
    return;
  }
  document.getElementById('usersBody').innerHTML=users.map(u=>{
    const isChecked=u.status==='checked-in';
    const emoji=EVENT_EMOJIS[u.event]||'🎪';
    const yearMap={'FY':'1st Year','SY':'2nd Year','TY':'3rd Year','LY':'Final Year'};
    return`<tr>
      <td><div class="user-cell"><div class="user-dot ${getAvatarClass(u.name)}">${getInitials(u.name)}</div><div><div class="user-name">${u.name}</div>${u.email?`<div class="user-email">${u.email}</div>`:''}</div></div></td>
      <td><span class="event-tag">${emoji} ${u.event}</span></td>
      <td><span class="year-badge">${yearMap[u.year]||u.year||'—'}</span></td>
      <td><span class="status-badge ${isChecked?'checked':'pending'}"><span class="status-dot"></span>${isChecked?'Checked In':'Pending'}</span></td>
      <td><span class="time-cell">${formatDate(u.registeredAt)}</span></td>
      <td><button class="checkin-btn ${isChecked?'undo-checkin':'do-checkin'}" onclick="toggleCheckin('${u._id}',${isChecked},this)">${isChecked?'Undo':'✓ Check In'}</button></td>
    </tr>`;
  }).join('');
}

async function toggleCheckin(id,isChecked,btn){
  btn.disabled=true;btn.textContent='...';
  const newStatus=isChecked?'not checked-in':'checked-in';
  try{await fetch(`/users/${id}/checkin`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:newStatus})})}catch(e){}
  const u=allUsers.find(x=>x._id===id);
  if(u)u.status=newStatus;
  applyFilters();
  showToast(isChecked?'Check-in reversed':'✓ Checked in!');
}

function exportCSV(){
  const headers=['Name','Email','Event','Year','Status','Registered'];
  const rows=allUsers.map(u=>[u.name,u.email||'',u.event,u.year||'',u.status,u.registeredAt?new Date(u.registeredAt).toLocaleString():'']);
  const csv=[headers,...rows].map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
  const a=document.createElement('a');a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(csv);a.download='registrations.csv';a.click();
  showToast('📥 CSV exported!');
}

loadUsers();
</script>
</body>
</html>
